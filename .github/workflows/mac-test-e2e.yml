name: mac-test-e2e

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  MISE_HTTP_TIMEOUT: 120
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  mac-test-e2e:
    name: mac-test-e2e
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make mac-test-e2e E2E_RESULT_BUNDLE_PATH="$RUNNER_TEMP/supatermE2E.xcresult"
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mac-test-e2e-xcresult
          path: ${{ runner.temp }}/supatermE2E.xcresult
          if-no-files-found: ignore
