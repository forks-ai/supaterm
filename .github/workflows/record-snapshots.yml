name: record-snapshots

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  MISE_HTTP_TIMEOUT: 120
  MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  mac-record-snapshots:
    name: mac-record-snapshots
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make mac-record-snapshots || true
      - uses: actions/upload-artifact@v6
        with:
          name: snapshot-baselines
          path: apps/mac/supatermSnapshotTests/__Snapshots__/SupatermSnapshotTests
          if-no-files-found: error
